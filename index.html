<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="" class="weatherForm">
        <input type="text" name="" id="inputBox" class="cityInput" placeholder="Enter City">
        <button type="submit">Get Wether</button>
    </form>
    <div class="card">
        <h1 class="cityDisplay">Howrah</h1>
        <p class="tempDisplay">28°C</p>
        <p class="humidityDisplay">Humidity:75%</p>
        <p class="descDisplay">Clear Sky</p>
        <p class="wetherEmoji">☀️</p>
        <p class="errorDisplay">PLease Enter a city</p>
    </div>
    
</body>
<script src="config.js"></script>
<script src="index.js"></script>
</html>
